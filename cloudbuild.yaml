steps:
# Install dependencies
- name: 'node:20'
  entrypoint: npm
  args: ['ci']

# Security audit — fail on critical/high CVEs
- name: 'node:20'
  entrypoint: npm
  args: ['audit', '--audit-level=high']

# Run tests
- name: 'node:20'
  entrypoint: bash
  args: ['-c', 'CI=true npm test -- --watchAll=false']

# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/sonarft/my-app', '.']

# Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['run', 'deploy', 'my-app', '--image', 'gcr.io/sonarft/my-app', '--region', 'us-central1', '--platform', 'managed', '--allow-unauthenticated']

images:
- 'gcr.io/sonarft/my-app'
